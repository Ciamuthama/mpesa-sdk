spring.config.import=optional:file:.env[.properties]
spring.application.name=sdkmpesa
spring.ai.mcp.server.sse.enabled=true
spring.main.lazy-initialization=false
spring.ai.mcp.server.stdio=false
spring.ai.mcp.server.sse-endpoint=/sse
spring.ai.mcp.server.name=mpesa-agent
spring.ai.mcp.server.version=1.0.0

# Enables SSE transport
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.sse-message-endpoint=/mcp/message
spring.mvc.converters.preferred-json-mapper=jackson


# --- Daraja API Configuration ---
daraja.consumer.key=${DARAJA_CONSUMER_KEY:your-consumer-key-here}
daraja.consumer.secret=${DARAJA_CONSUMER_SECRET:your-consumer-secret-here}
daraja.passkey=${DARAJA_PASSKEY:your-passkey-here}
daraja.shortcode=${DARAJA_SHORTCODE:174379}
daraja.callback-url=${DARAJA_CALLBACK_URL:https://yourdomain.com/api/v1/callback}

# Base URL: sandbox or production
# Sandbox: https://sandbox.safaricom.co.ke
# Production: https://api.safaricom.co.ke
daraja.base-url=${DARAJA_BASE_URL:https://sandbox.safaricom.co.ke}

# --- Server Configuration ---
server.port=${SERVER_PORT:8080}

# --- API Security ---
# API key for authenticating clients (LLMs, WhatsApp integration, etc.)
app.api-key=${APP_API_KEY:change-me-in-production}

# --- Actuator ---
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# --- Logging ---
logging.level.com.ciamuthama.sdkmpesa=INFO
logging.level.org.springframework.security=WARN